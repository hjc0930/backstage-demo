name: Deploy (Server Build)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # 进入项目目录
            cd ${{ secrets.PROJECT_PATH || '/root/backstage-demo' }}

            # 拉取最新代码
            git pull origin main

            # 安装依赖
            yarn install --frozen-lockfile

            # 类型检查
            yarn tsc

            # 构建前后端
            yarn build:all

            # 构建 Docker 镜像
            yarn build-image

            # 停止并重启服务
            docker-compose down
            docker-compose up -d

            # 清理旧镜像
            docker image prune -f

            # 显示状态
            docker-compose ps

      - name: Health Check
        run: |
          sleep 30
          curl -f ${{ secrets.APP_BASE_URL }} || exit 1
