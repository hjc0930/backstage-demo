name: Deploy (Server Build)

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Determine branch
        id: branch
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "BRANCH=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Server
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e

            BRANCH="${{ steps.branch.outputs.BRANCH }}"
            PROJECT_PATH="${{ secrets.PROJECT_PATH }}"

            echo "=========================================="
            echo "Starting deployment for branch: $BRANCH"
            echo "Time: $(date)"
            echo "=========================================="

            # 进入项目目录
            cd $PROJECT_PATH

            # 保存当前镜像用于回滚
            echo "Saving current image for rollback..."
            docker tag backstage:latest backstage:previous 2>/dev/null || true

            # 拉取最新代码
            echo "Pulling latest code..."
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH

            # 安装依赖
            echo "Installing dependencies..."
            yarn install --frozen-lockfile

            # 类型检查 (可选，取消注释启用)
            # echo "Running type check..."
            # yarn tsc

            # 构建前后端
            echo "Building application..."
            yarn build:all

            # 构建 Docker 镜像
            echo "Building Docker image..."
            yarn build-image

            # 停止旧容器
            echo "Stopping old containers..."
            docker-compose down || true

            # 启动新容器
            echo "Starting new containers..."
            docker-compose up -d

            # 等待服务启动
            echo "Waiting for service to start..."
            sleep 10

            # 健康检查
            echo "Running health check..."
            for i in {1..30}; do
              if wget -q --spider http://localhost:7007/healthcheck 2>/dev/null; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check failed after 30 attempts!"
                exit 1
              fi
              echo "Attempt $i/30 - Service not ready yet..."
              sleep 2
            done

            # 清理旧镜像
            echo "Cleaning up old images..."
            docker image prune -f

            # 显示状态
            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "Container status:"
            docker-compose ps
            echo "=========================================="

      - name: Health Check (External)
        run: |
          echo "Waiting for service to be accessible..."
          sleep 15

          echo "Checking external health endpoint..."
          for i in {1..10}; do
            if curl -sf "${{ secrets.APP_BASE_URL }}/healthcheck" > /dev/null 2>&1; then
              echo "External health check passed!"
              exit 0
            fi
            echo "Attempt $i/10 - Service not accessible externally yet..."
            sleep 5
          done

          echo "External health check failed!"
          exit 1

  # 部署失败时通知（可选）
  notify-failure:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify deployment failure
        run: |
          echo "::error::Deployment failed for branch ${{ github.ref_name }}"
          echo "Deployment failed at $(date)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

  # 部署失败回滚（可选）
  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            echo "Rolling back to previous version..."

            # 检查是否存在上一个版本
            if docker inspect backstage:previous > /dev/null 2>&1; then
              # 停止当前容器
              docker-compose down || true

              # 使用上一个版本的镜像
              docker tag backstage:previous backstage:latest
              docker-compose up -d

              echo "Rollback completed!"
              docker-compose ps
            else
              echo "No previous version available for rollback"
            fi
