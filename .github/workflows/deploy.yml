name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 支持手动触发

env:
  # 镜像配置 - 使用腾讯云容器镜像服务 (TCR)
  # 如需使用 Docker Hub，改为: ${{ secrets.DOCKER_USERNAME }}/backstage
  IMAGE_NAME: ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/backstage
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build backend
        run: yarn build:backend

      - name: Login to Tencent Container Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
    steps:
      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_CLOUD_HOST }}
          username: ${{ secrets.TENCENT_CLOUD_USER }}
          key: ${{ secrets.TENCENT_CLOUD_SSH_KEY }}
          port: ${{ secrets.TENCENT_CLOUD_PORT || 22 }}
          envs: IMAGE_NAME,APP_BASE_URL
          script: |
            cd /opt/backstage-demo

            # 登录腾讯云容器镜像服务
            docker login --username=${{ secrets.TCR_USERNAME }} --password=${{ secrets.TCR_PASSWORD }} ccr.ccs.tencentyun.com

            # 拉取最新镜像
            docker pull $IMAGE_NAME:latest

            # 停止旧容器
            docker-compose down || true

            # 启动新容器（使用环境变量指定镜像）
            export DOCKER_IMAGE=$IMAGE_NAME:latest
            docker-compose up -d

            # 清理旧镜像
            docker image prune -f

            # 显示运行状态
            docker-compose ps

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.APP_BASE_URL }}/healthcheck || exit 1

  # 可选：部署失败时回滚
  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_CLOUD_HOST }}
          username: ${{ secrets.TENCENT_CLOUD_USER }}
          key: ${{ secrets.TENCENT_CLOUD_SSH_KEY }}
          port: ${{ secrets.TENCENT_CLOUD_PORT || 22 }}
          envs: IMAGE_NAME
          script: |
            cd /opt/backstage-demo

            # 停止当前容器
            docker-compose down

            # 使用之前的镜像版本
            export DOCKER_IMAGE=$IMAGE_NAME:previous
            docker-compose up -d
