name: Deploy to Tencent Cloud (Docker Hub)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # 使用 Docker Hub
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/backstage
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build backend
        run: yarn build:backend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
    steps:
      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TENCENT_CLOUD_HOST }}
          username: ${{ secrets.TENCENT_CLOUD_USER }}
          key: ${{ secrets.TENCENT_CLOUD_SSH_KEY }}
          port: ${{ secrets.TENCENT_CLOUD_PORT || 22 }}
          envs: IMAGE_NAME,APP_BASE_URL
          script: |
            cd /opt/backstage-demo

            # 拉取最新镜像
            docker pull $IMAGE_NAME:latest

            # 停止旧容器
            docker-compose down || true

            # 启动新容器（使用环境变量指定镜像）
            export DOCKER_IMAGE=$IMAGE_NAME:latest
            docker-compose up -d

            # 清理旧镜像
            docker image prune -f

            # 显示运行状态
            docker-compose ps

      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.APP_BASE_URL }}/healthcheck || exit 1
