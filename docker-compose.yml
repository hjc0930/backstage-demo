version: '3.8'

services:
  backstage:
    image: ${DOCKER_IMAGE:-backstage:latest}
    container_name: backstage
    ports:
      - "7007:7007"
    volumes:
      - ./data:/app/data  # 持久化数据库
      - ./examples:/app/examples  # 持久化 catalog 数据
    env_file:
      - .env
    environment:
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:7007}
      - BACKEND_AUTH_SECRET=${BACKEND_AUTH_SECRET:-change-this}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7007/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
